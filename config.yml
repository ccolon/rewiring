# Default configuration for network rewiring simulation
# These values can be overridden by command-line arguments

# Experiment settings
exp_type: ts  # Experiment type (ts, initntw, hetero, tier_ts, slowing, shootOneSaveFinal)
exp_name: aa  # Experiment name for output files

# Simulation parameters
nb_rounds: 50  # Number of simulation rounds
nb_firms: 50  # Number of firms in the network
cc: 1  # Number of extra potential supplier per firm

# Economic variance parameters (0 = no variance)
# Note: Command-line --sigma-* arguments override these and force "normal" mode
sigma_w: 0.0  # Sigma for weights
sigma_z: 0.0  # Sigma for productivity
sigma_b: 0.0  # Sigma for returns to scale
sigma_a: 0.0  # Sigma for labor share

# Network parameters
aisi_spread: 0.2  # AiSi productivity spread parameter, < 1
network_type: new_tech  # Network generation mode: new_tech (generate new), same_all (load cached), same_tech_new_init (cached params, new topology)

# Anticipation mode for firm rewiring decisions
anticipation_mode: aa  # Options:
  # - full (compute full equilibrium),
  # - partial (compute partial equilibrium within tier distance),
  # - no_anticipation (use current prices without recomputing equilibrium)
  # - aa (ratchet of aa, only works at CRS)
tier: 1  # Tier parameter: neighborhood distance for partial anticipation mode (only used when anticipation_mode is partial)

# Economic parameter generation settings (only used when network_type is new_tech)
economic_params:
  b:  # Returns to scale
    mode: homogeneous  # Options: homogeneous, uniform, normal
    # For homogeneous mode:
    value: 1.0
    # For uniform mode:
    min: 0.8
    max: 0.95
    # For normal mode:
    mean: 0.9
    sigma: 0.0  # Overridden by command-line --sigma-b if provided
    bound_min: 0.0
    bound_max: 1.0

  a:  # Labor share (simple normal distribution, no modes)
    mean: 0.5
    eps: 0  # Used for min_a = eps, and in max calculation: min((1-eps)/b[i], 1-eps)

  z:  # Productivity
    mode: homogeneous  # Options: homogeneous, uniform, normal
    value: 1.0
    min: 0.5
    max: 1.5
    mean: 1.0
    sigma: 0.0  # Overridden by command-line --sigma-z if provided
    bound_min: 0.1
